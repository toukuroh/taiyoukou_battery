# =============================================================
# 太陽光パネル 製品データベース
# 出典: 各メーカー公式データシート (2024年時点の参考値)
# =============================================================
#
# 各パラメータの説明:
#   power_w          : 公称最大出力 [W] (STC: 1000W/m², 25°C, AM1.5)
#   efficiency       : モジュール変換効率 [-]  (例: 0.215 = 21.5%)
#   area_m2          : モジュール面積 [m²]  ← power_w / (efficiency × 1000) で導出
#   temp_coefficient : 最大出力温度係数 [/°C]  (例: -0.0035 = -0.35%/°C)
#   noct             : 公称動作セル温度 NOCT [°C]
#   cell_type        : セル種別
#   price_yen        : 参考単価 [円/枚] (工事費別・参考値)
#
# ※ panel_area (m²) はモジュール面積です。
#   シミュレーションでは panel_area × panel_count が pv_generation.py に渡されます。
# =============================================================

panels:

  # ---- Panasonic (パナソニック) ----

  - model: "Panasonic EverVolt H 430W"
    maker: "Panasonic"
    series: "EverVolt H (HIT/HJT)"
    power_w: 430
    efficiency: 0.222       # 22.2%
    area_m2: 1.937          # 430 / (0.222 × 1000)
    temp_coefficient: -0.0026  # HIT は温度係数が低い
    noct: 44
    cell_type: "HIT (HJT)"
    price_yen: 82000
    note: "業界最高水準の低温度係数。日射量が少ない冬季・梅雨に有利。"

