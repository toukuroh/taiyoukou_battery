# =============================================================
# パワーコンディショナ (PCS) 製品データベース
# 出典: 各メーカー公式データシート (2024年時点の参考値)
# =============================================================
#
# パラメータ説明:
#   rated_kw     : 定格出力 [kW]
#   efficiency   : 最大変換効率 / CEC 平均効率 [-]
#   system_type  : 単相 / 三相
#   price_yen    : 参考価格 [円] (工事費別)
#
# ※ PCS の定格出力がパネル合計出力より小さい場合、出力クリッピングが発生します。
#   一般的に「PCS 定格 / パネル DC 合計出力」= DC/AC 比 1.0〜1.3 が推奨範囲です。
#   (例: 5.5kW PCS に対して DC 出力 ~5.5〜7.2kW 相当のパネルが適正)
# =============================================================

