# =============================================================
# 蓄電池 製品データベース
# 出典: 各メーカー公式データシート・カタログ (2024年時点の参考値)
# =============================================================
#
# パラメータ説明:
#   capacity_kwh      : 蓄電容量 [kWh]  (メーカー公称値 = 使用可能容量)
#   capacity_gross_kwh: 総容量 [kWh]    (内部容量。省略時は capacity_kwh と同じ)
#   charge_efficiency   : 充電効率 [-]   (往復効率 = charge × discharge)
#   discharge_efficiency: 放電効率 [-]
#   max_charge_kw     : 最大充電電力 [kW]
#   max_discharge_kw  : 最大放電電力 [kW]
#   soc_min           : SOC 下限 [-]    (0.0 = メーカーが内部管理)
#   soc_max           : SOC 上限 [-]    (1.0 = メーカーが内部管理)
#   system_type       : 接続方式 (AC連系 / DC連系 / ハイブリッド)
#   price_yen         : 本体参考価格 [円] (工事費・パワコン別)
#
# ※ count > 1 のとき: capacity_kwh × count で計算
#   ただし max_charge_kw / max_discharge_kw はモデルによって増加しない場合あり
#   → batteries.yaml の scalable_power: true/false で制御
# =============================================================

batteries:

  # ---- Tesla ----

  - model: "Tesla Powerwall 3"
    maker: "Tesla"
    capacity_kwh: 13.5          # 使用可能容量 (公称)
    capacity_gross_kwh: 15.0    # 総容量
    charge_efficiency: 0.960    # 往復効率 ~92% → 各方向 √0.92 ≈ 0.96
    discharge_efficiency: 0.960
    max_charge_kw: 11.5         # 連続充電 (太陽光入力含む合計)
    max_discharge_kw: 11.5      # 連続放電
    peak_discharge_kw: 30.0     # ピーク放電 (10秒)
    soc_min: 0.0                # Tesla は容量=使用可能容量として管理
    soc_max: 1.0
    system_type: "ハイブリッド (AC/DC 統合インバータ内蔵)"
    scalable_power: false       # 複数台でも最大電力は変わらない (AC結合のため)
    price_yen: 1530000          # 本体+工事費込みの市場価格参考
    note: "インバータ内蔵・単体で完結。停電時の全負荷バックアップ対応。"

